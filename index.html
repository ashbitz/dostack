<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DoStack</title>
    <meta
      name="description"
      content="Aplicacion web para gestionar tareas con categorias, prioridades y filtros."
    />
    <link rel="icon" type="image/png" href="icon.png" />
    <link rel="stylesheet" href="output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=Zen+Dots&display=swap"
      rel="stylesheet"
    />
  </head>

  <body
    class="min-h-screen font-sans bg-gradient-to-br from-indigo-100 via-sky-100 to-purple-100 dark:from-slate-900 dark:via-indigo-950 dark:to-slate-900"
  >
    <header
      class="mx-4 mt-5 max-w-[1500px] rounded-xl border border-gray-200 bg-white px-4 py-4 shadow-lg dark:border-slate-700 dark:bg-slate-800/80 dark:text-slate-100 md:mx-auto md:px-12 md:py-5"
    >
      <div class="flex w-full items-center justify-between gap-4">
        <h1 class="flex items-center text-3xl font-bold">
          <img src="icon.png" alt="Logo de Taskify" class="mr-2 h-9 w-9" />
          Do<span class="text-indigo-500">Stack</span>
        </h1>

        <button
          id="theme-toggle"
          type="button"
          aria-label="Activar modo oscuro"
          aria-pressed="false"
          class="flex h-10 w-10 items-center justify-center rounded-full border border-gray-200 bg-white text-xl transition hover:bg-gray-100 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:hover:bg-slate-700"
        >
          &#x1F311;
        </button>
      </div>
    </header>

    <main
      class="mx-auto mt-5 mb-6 flex max-w-[1500px] flex-col gap-3 px-4 md:flex-row md:items-start md:px-0"
    >
      <aside
        class="w-full rounded-xl border border-gray-200 bg-white p-5 shadow-lg dark:border-slate-700 dark:bg-slate-800/80 dark:text-slate-100 md:w-64"
      >
        <h2
          class="mb-4 font-display text-[1.2rem] font-bold text-slate-900 dark:text-slate-100"
        >
          &#128205; Men&#250;
        </h2>

        <nav aria-label="Filtros de tareas">
          <ul class="mb-2 flex flex-col gap-2 text-slate-900">
            <li>
              <button
                id="nav-home"
                data-filter="all"
                type="button"
                aria-controls="task-list"
                aria-pressed="false"
                class="aside-link inline-flex w-full items-center rounded-lg px-2 py-1 text-slate-900 transition-colors hover:bg-slate-100 hover:text-slate-900 dark:text-slate-100 dark:hover:bg-slate-700 dark:hover:text-slate-100"
              >
                Mostrar todas
              </button>
            </li>
            <li>
              <button
                id="nav-open-tasks"
                data-filter="open"
                type="button"
                aria-controls="task-list"
                aria-pressed="false"
                class="aside-link inline-flex w-full items-center rounded-lg px-2 py-1 text-slate-900 transition-colors hover:bg-slate-100 hover:text-slate-900 dark:text-slate-100 dark:hover:bg-slate-700 dark:hover:text-slate-100"
              >
                Tareas abiertas
              </button>
            </li>
            <li>
              <button
                id="nav-closed-tasks"
                data-filter="closed"
                type="button"
                aria-controls="task-list"
                aria-pressed="false"
                class="aside-link inline-flex w-full items-center rounded-lg px-2 py-1 text-slate-900 transition-colors hover:bg-slate-100 hover:text-slate-900 dark:text-slate-100 dark:hover:bg-slate-700 dark:hover:text-slate-100"
              >
                Tareas cerradas
              </button>
            </li>
            <li>
              <span
                class="inline-flex items-center rounded-lg px-2 py-1 text-slate-400 dark:text-slate-500"
              >
                Contacto
              </span>
            </li>
          </ul>
        </nav>
      </aside>

      <div class="flex flex-1 flex-col gap-3">
        <section
          class="rounded-xl border border-gray-200 bg-white p-5 shadow-lg dark:border-slate-700 dark:bg-slate-800/80 dark:text-slate-100"
        >
          <h2
            class="mb-4 font-display text-[1.2rem] font-bold text-slate-900 dark:text-slate-100"
          >
            &#128196 Nueva tarea
          </h2>

          <form id="task-form" novalidate class="flex flex-wrap gap-3">
            <label class="sr-only" for="task-input">Nombre de la tarea</label>
            <input
              class="min-w-[220px] flex-1 rounded-lg border border-gray-300 px-3 py-2 text-slate-900 outline-none placeholder:text-slate-400 focus:ring-2 focus:ring-indigo-400 dark:bg-slate-800 dark:text-slate-100 dark:placeholder:text-slate-500"
              type="text"
              id="task-input"
              name="task"
              placeholder="Tarea"
              autocomplete="off"
              required
            />

            <label class="sr-only" for="category-input">Categoria</label>
            <input
              class="min-w-[180px] flex-1 rounded-lg border border-gray-300 px-3 py-2 text-slate-900 outline-none placeholder:text-slate-400 focus:ring-2 focus:ring-indigo-400 dark:bg-slate-800 dark:text-slate-100 dark:placeholder:text-slate-500"
              type="text"
              id="category-input"
              name="category"
              placeholder="Categoria"
              autocomplete="off"
              required
            />

            <label class="sr-only" for="priority-input">Prioridad</label>
            <select
              id="priority-input"
              name="priority"
              class="w-full rounded-lg border border-gray-300 px-3 py-2 text-slate-400 outline-none focus:ring-2 focus:ring-indigo-400 dark:border-gray-300 dark:bg-slate-800 dark:text-slate-500 sm:w-36"
              required
            >
              <option value="" selected disabled>Prioridad</option>
              <option value="alta">Alta</option>
              <option value="media">Media</option>
              <option value="baja">Baja</option>
            </select>

            <button
              type="submit"
              class="w-full rounded-lg bg-indigo-500 px-4 py-2 font-semibold text-white transition hover:bg-indigo-600 sm:w-auto"
            >
              A&#241;adir
            </button>

            <p
              id="task-form-error"
              class="hidden w-full text-sm font-medium text-red-600 dark:text-red-400"
              aria-live="assertive"
            ></p>
          </form>
        </section>

        <section
          class="rounded-xl border border-gray-200 bg-white p-5 shadow-lg dark:border-slate-700 dark:bg-slate-800/80 dark:text-slate-100"
        >
          <h2
            class="mb-4 font-display text-[1.2rem] font-bold text-slate-900 dark:text-slate-100"
          >
            &#x1F58B;&#xFE0F; Mis tareas
          </h2>

          <div class="relative mb-4 w-full md:max-w-sm">
            <label class="sr-only" for="task-search-input">Buscar tareas</label>
            <span
              aria-hidden="true"
              class="pointer-events-none absolute top-1/2 left-3 -translate-y-1/2 font-sans not-italic text-base text-slate-400 dark:text-slate-500"
            >
              &#128269;
            </span>
            <input
              id="task-search-input"
              type="search"
              placeholder="Buscar tarea..."
              autocomplete="off"
              class="w-full rounded-lg border border-gray-300 bg-white py-2 pr-3 pl-10 text-slate-900 italic outline-none placeholder:text-slate-400 focus:ring-2 focus:ring-indigo-400 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:placeholder:text-slate-500"
            />
          </div>

          <div
            id="task-list"
            role="list"
            aria-live="polite"
            aria-label="Lista de tareas"
          ></div>
        </section>
      </div>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
